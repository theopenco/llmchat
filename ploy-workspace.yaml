# Workspace-level config for `ploy dev`.
# `ploy dev` from the repo root runs all worker/dynamic projects (api).
# Next.js projects (dashboard, marketing) are skipped by workspace dev —
# run them in their own dirs with `pnpm --filter @llmchat/<app> dev` or
# `cd apps/<app> && ploy dev`.

dashboard:
  port: 9787

ports:
  worker:
    from: 8787
