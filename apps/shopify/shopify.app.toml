# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "092ef6d1abd61d5705b19f03efbdc65e"
name = "ClankerSupport"
# ⚠ `shopify app deploy` snapshots this URL into the released config — the app
# home AND every relative webhook URI resolve against it (§9 results, finding 1
# in docs/shopify-app-plan.md). It must be the real production origin before
# any deploy; `shopify app dev` still overrides it with its tunnel for dev.
application_url = "https://shopify.clankersupport.com"
embedded = true

[access_scopes]
# read_orders + write_returns power the agent's order actions (lookup + file a
# return via the dashboard pairing flow). App-data metafields (the project-key
# connection) still need no scopes (docs/shopify-app-plan.md §5). Adding scopes
# triggers a merchant re-consent prompt on next admin load; the app/scopes_update
# webhook below already handles the grant notification.
scopes = "read_orders,write_returns"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Mandatory GDPR topics (docs/shopify-app-plan.md §7), multiplexed onto one
  # route — the topic arrives in X-Shopify-Topic. Relative URIs are
  # documented-valid for compliance topics.
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[auth]
redirect_urls = [ "https://shopify.clankersupport.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true
