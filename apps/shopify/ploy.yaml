# workerd port (Ploy pivot): this file's existence pulls apps/shopify INTO
# `ploy dev` workspace mode — deliberately reversing the Phase-1 invisibility,
# since Ploy is now the deploy target. `shopify app dev` remains the separate
# flow for theme-extension work (TTY tunnel; runs react-router dev on Node
# with in-memory sessions).
# Binding names must match wrangler.jsonc (used verbatim by ploy dev when
# present; this file is what provisions prod).
kind: dynamic
name: shopify
build: pnpm install --frozen-lockfile && pnpm build:app
main: workers/app.ts
dev:
  port: 3006
# No compatibility_flags: Ploy injects nodejs_compat_v2 itself (adding
# nodejs_compat here collides — "cannot be used together").
compatibility_date: "2025-10-08"
state:
  SESSION_STORAGE: shopify_sessions
env:
  SHOPIFY_API_KEY: $SHOPIFY_API_KEY
  SHOPIFY_API_SECRET: $SHOPIFY_API_SECRET
  SHOPIFY_APP_URL: $SHOPIFY_APP_URL
  SCOPES: $SCOPES
  CLANKER_API_ORIGIN: $CLANKER_API_ORIGIN
