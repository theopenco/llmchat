name: api
runtime: workers
entry: src/index.ts
build: pnpm --filter @llmchat/api build

db:
  DB: llmchat-db
  # owner: this project owns migrations
  migrations: ../../packages/db/migrations

kv:
  CACHE: llmchat-cache

routes:
  - api.llmchat.io/*

secrets:
  - LLMGATEWAY_API_KEY
  - LLMGATEWAY_BASE_URL
  - RESEND_API_KEY
  - RESEND_FROM_EMAIL
  - INBOUND_EMAIL_DOMAIN
  - STRIPE_SECRET_KEY
  - STRIPE_WEBHOOK_SECRET
  - BETTER_AUTH_SECRET
  - BETTER_AUTH_URL
  - DASHBOARD_URL
  - WIDGET_ALLOWED_ORIGINS
