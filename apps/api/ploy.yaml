kind: dynamic
# Widget build first: it emits src/generated/widget-bundle.ts (served at /widget.js).
build: pnpm --filter @llmchat/widget build && pnpm --filter @llmchat/api build
out: dist
main: src/index.ts

db:
  DB: llmchat_db

state:
  CACHE: llmchat_cache

env:
  LLMGATEWAY_BASE_URL: $LLMGATEWAY_BASE_URL
  RESEND_FROM_EMAIL: $RESEND_FROM_EMAIL
  INBOUND_EMAIL_DOMAIN: $INBOUND_EMAIL_DOMAIN
  BETTER_AUTH_URL: $BETTER_AUTH_URL
  BETTER_AUTH_SECRET: $BETTER_AUTH_SECRET
  DASHBOARD_URL: $DASHBOARD_URL
  # Public CORS policy for the embeddable widget (not a secret): the widget
  # must load on arbitrary customer sites. Security rests on the public
  # project key + rate limits, not origin restriction. Per-project allowed
  # domains can tighten this later.
  WIDGET_ALLOWED_ORIGINS: "*"
  LLMGATEWAY_API_KEY: $LLMGATEWAY_API_KEY
  STRIPE_SECRET_KEY: $STRIPE_SECRET_KEY
  STRIPE_WEBHOOK_SECRET: $STRIPE_WEBHOOK_SECRET
  RESEND_API_KEY: $RESEND_API_KEY

dev:
  port: 8787
