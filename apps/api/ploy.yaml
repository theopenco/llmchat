kind: dynamic
# Widget build first: it emits src/generated/widget-bundle.ts (served at /widget.js).
build: pnpm --filter @llmchat/widget build && pnpm --filter @llmchat/api build
out: dist
main: src/index.ts

db:
  DB: llmchat_db

state:
  STATE: llmchat_state

env:
  LLMGATEWAY_BASE_URL: $LLMGATEWAY_BASE_URL
  RESEND_FROM_EMAIL: $RESEND_FROM_EMAIL
  INBOUND_EMAIL_DOMAIN: $INBOUND_EMAIL_DOMAIN
  BETTER_AUTH_URL: $BETTER_AUTH_URL
  DASHBOARD_URL: $DASHBOARD_URL
  MARKETING_URL: $MARKETING_URL
  SHOWCASE_URL: $SHOWCASE_URL
  ADMIN_URL: $ADMIN_URL
  LLMGATEWAY_API_KEY: $LLMGATEWAY_API_KEY
  RESEND_API_KEY: $RESEND_API_KEY
  RESEND_INBOUND_WEBHOOK_SECRET: $RESEND_INBOUND_WEBHOOK_SECRET
  TRUSTED_CLIENT_IP_HEADER: $TRUSTED_CLIENT_IP_HEADER
  STRIPE_SECRET_KEY: $STRIPE_SECRET_KEY
  STRIPE_WEBHOOK_SECRET: $STRIPE_WEBHOOK_SECRET
  STRIPE_PRICE_STARTER: $STRIPE_PRICE_STARTER
  STRIPE_PRICE_GROWTH: $STRIPE_PRICE_GROWTH
  STRIPE_PRICE_SCALE: $STRIPE_PRICE_SCALE
  STRIPE_PRICE_STARTER_ANNUAL: $STRIPE_PRICE_STARTER_ANNUAL
  STRIPE_PRICE_GROWTH_ANNUAL: $STRIPE_PRICE_GROWTH_ANNUAL
  STRIPE_PRICE_SCALE_ANNUAL: $STRIPE_PRICE_SCALE_ANNUAL
  STRIPE_PRICE_GROWTH_OVERAGE: $STRIPE_PRICE_GROWTH_OVERAGE
  STRIPE_PRICE_SCALE_OVERAGE: $STRIPE_PRICE_SCALE_OVERAGE
  STRIPE_METER_EVENT: $STRIPE_METER_EVENT
  INTERNAL_ACCOUNT_EMAILS: $INTERNAL_ACCOUNT_EMAILS
  ADMIN_EMAILS: $ADMIN_EMAILS
  BETTER_AUTH_SECRET: $BETTER_AUTH_SECRET
  GOOGLE_CLIENT_ID: $GOOGLE_CLIENT_ID
  GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET
  GITHUB_CLIENT_ID: $GITHUB_CLIENT_ID
  GITHUB_CLIENT_SECRET: $GITHUB_CLIENT_SECRET
  POSTHOG_API_KEY: $POSTHOG_API_KEY
  POSTHOG_HOST: $POSTHOG_HOST
  DISCORD_NOTIFICATION_URL: $DISCORD_NOTIFICATION_URL
  DISCORD_TRAFFIC_NOTIFICATION_URL: $DISCORD_TRAFFIC_NOTIFICATION_URL
  POSTHOG_PERSONAL_API_KEY: $POSTHOG_PERSONAL_API_KEY
  POSTHOG_PROJECT_ID: $POSTHOG_PROJECT_ID
  POSTHOG_QUERY_HOST: $POSTHOG_QUERY_HOST
  # TRUSTED integration upstream overrides (tests/self-host/demo mock). Leave
  # unset in prod: Shopify pins to the shop domain, Cal.com to api.cal.com.
  SHOPIFY_API_BASE: $SHOPIFY_API_BASE
  CALCOM_API_BASE: $CALCOM_API_BASE

# Traffic report crons (see src/lib/traffic-report.ts — the expressions MUST
# stay in sync with TRAFFIC_CRON_WEEKLY / TRAFFIC_CRON_MONTHLY, which map the
# fired expression back to a reporting period).
cron:
  TRAFFIC_REPORT_WEEKLY: "0 8 * * 1"
  TRAFFIC_REPORT_MONTHLY: "30 8 1 * *"

dev:
  port: 8787
