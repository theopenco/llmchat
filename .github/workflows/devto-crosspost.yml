name: devto-crosspost

# Cross-posts blog articles to dev.to on a Mon/Wed/Fri cadence. Posts ONE queued
# item per run (or nothing when the queue is drained). Idempotent — safe to re-run.
# Queue + logic live in automation/devto/. Requires the DEVTO_API_KEY repo secret.

on:
  schedule:
    - cron: "0 14 * * 1,3,5" # Mon/Wed/Fri 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the payload and log it, but do NOT publish"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: devto-crosspost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Post next queued article
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
        run: node automation/devto/post-next.mjs
