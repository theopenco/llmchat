packages:
  - apps/*
  # apps/shopify is its own pnpm workspace (own lockfile): it shares no code
  # with the monorepo and its dep tree (prisma engines, @shopify/cli) must not
  # bleed into the other apps' resolution (pnpm dedupePeerDependents) or into
  # Ploy's deploy install.
  - "!apps/shopify"
  - packages/*

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@tailwindcss/oxide"
  - better-sqlite3
  - core-js
  - esbuild
  - sharp
  - workerd
